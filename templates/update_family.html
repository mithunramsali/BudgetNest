{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="page-header animate-in">
    <h1>Update Member</h1>
    <p>Edit details for {{ data.firstname }}.</p>
</div>

<div class="glass-card form-card animate-in" style="animation-delay: 0.1s; max-width: 500px; margin: 0 auto;">
    {% for message in messages %}
    <div class="alert alert-success">
        <i data-lucide="check-circle" style="width:18px;height:18px;flex-shrink:0"></i>
        {{ message }}
    </div>
    {% endfor %}

    <form action="{% url 'updatefamily' data.id %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">First Name</label>
            <input class="form-input" type="text" placeholder="First Name" name="firstname" value="{{ data.firstname }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Age</label>
            <input class="form-input" type="number" placeholder="Age" name="age" value="{{ data.age }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">Income</label>
            <input class="form-input" type="number" placeholder="Income" name="income" value="{{ data.income }}" required>
        </div>
        <div style="display:flex; gap:12px;">
            <a href="{% url 'seefamily' %}" class="btn-secondary" style="flex:1">
                <i data-lucide="arrow-left" style="width:16px;height:16px"></i>
                Back
            </a>
            <button type="submit" class="btn-primary" style="flex:2">
                <i data-lucide="save" style="width:18px;height:18px"></i>
                Update Member
            </button>
        </div>
    </form>
</div>

{% endblock %}
