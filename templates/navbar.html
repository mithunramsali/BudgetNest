   <nav class="main-nav">
    <div class="nav-inner">
        <a href="{% url 'dashboard' %}" class="nav-brand">
            <i data-lucide="wallet" style="width:22px;height:22px;color:var(--accent)"></i>
            <span>BudgetNest</span>
        </a>

        <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
            <i data-lucide="menu" style="width:20px;height:20px"></i>
        </button>

        <div class="nav-links" id="navLinks">
            <a href="{% url 'addfamily' %}" class="nav-link">
                <i data-lucide="user-plus" style="width:16px;height:16px"></i>
                <span>Add Family</span>
            </a>
            <a href="{% url 'seefamily' %}" class="nav-link">
                <i data-lucide="users" style="width:16px;height:16px"></i>
                <span>Family</span>
            </a>
            <a href="{% url 'addexpense' %}" class="nav-link">
                <i data-lucide="plus-circle" style="width:16px;height:16px"></i>
                <span>Add Expenses</span>
            </a>
            <a href="{% url 'viewexpense' %}" class="nav-link">
                <i data-lucide="list" style="width:16px;height:16px"></i>
                <span>View Expenses</span>
            </a>
            <a href="{% url 'monthlyreport' %}" class="nav-link">
                <i data-lucide="calendar" style="width:16px;height:16px"></i>
                <span>Monthly</span>
            </a>
            <a href="{% url 'yearlyreport' %}" class="nav-link">
                <i data-lucide="bar-chart-2" style="width:16px;height:16px"></i>
                <span>Yearly</span>
            </a>
            <a href="{% url 'totalexpense' %}" class="nav-link">
                <i data-lucide="pie-chart" style="width:16px;height:16px"></i>
                <span>Total</span>
            </a>
            <form method="POST" action="{% url 'logout' %}" class="nav-link" style="padding:0">
                {% csrf_token %}
                <button type="submit" class="nav-logout">
                    <i data-lucide="log-out" style="width:16px;height:16px"></i>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </div>
</nav>

<style>
    .main-nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
    }

    .nav-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
    }

    .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text-primary);
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
    }

    .nav-toggle {
        display: none;
        background: none;
        border: none;
        color: var(--text-primary);
        cursor: pointer;
        padding: 8px;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .nav-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 10px;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s ease;
        border: none;
        background: none;
        cursor: pointer;
    }

    .nav-link:hover {
        color: var(--text-primary);
        background: rgba(255, 255, 255, 0.06);
    }

    .nav-logout {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 10px;
        color: var(--danger);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.2s ease;
        border: none;
        background: none;
        cursor: pointer;
    }

    .nav-logout:hover {
        background: rgba(239, 68, 68, 0.1);
    }

    @media (max-width: 900px) {
        .nav-toggle {
            display: block;
        }

        .nav-links {
            position: absolute;
            top: 64px;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            flex-direction: column;
            padding: 16px;
            gap: 4px;
            border-bottom: 1px solid var(--glass-border);
            display: none;
        }

        .nav-links.active {
            display: flex;
        }

        .nav-link {
            width: 100%;
            padding: 12px 16px;
        }
    }
</style>

<script>
    (function() {
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        if (toggle && links) {
            toggle.addEventListener('click', function() {
                links.classList.toggle('active');
            });
        }
    })();
</script>
